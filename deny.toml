# cargo-deny policy — advisories, license allow-list, dependency hygiene.
# Run locally with `cargo deny check`; CI runs it on every PR.

[graph]
targets = [
  "x86_64-pc-windows-msvc",
  "x86_64-unknown-linux-gnu",
]

[advisories]
version = 2
yanked = "deny"
# Transitive unmaintained notices (tauri's GTK3 stack, paste, rust-unic) are
# not actionable from here; only flag unmaintained crates we depend on
# directly.
unmaintained = "workspace"
# quick-xml XML-parser DoS advisories reach us only through
# plist -> tauri-utils, i.e. tauri's Apple Info.plist bundling path. This
# workspace ships Windows + Linux only (no macOS target), so that parser is
# never exercised at runtime, and plist "^1" pins quick-xml to 0.39 — the
# fixed 0.41 needs a tauri/plist bump we can't force from here. Revisit and
# drop these once tauri's dependency tree carries quick-xml >= 0.41.
ignore = [
  "RUSTSEC-2026-0194", # quick-xml: quadratic duplicate-attribute check
  "RUSTSEC-2026-0195", # quick-xml: unbounded namespace-decl allocation
]

[licenses]
version = 2
# Permissive licenses only — copyleft (GPL/AGPL/LGPL) is deliberately
# absent: this workspace ships MIT and must stay clean-room.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "BSL-1.0",
  "CC0-1.0",
  "Unicode-3.0",
  "MPL-2.0",
  "OpenSSL",
  "CDLA-Permissive-2.0",
]

# ring bundles code under a composite license that tooling can't always
# parse; clarify it as the standard ring terms.
[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Workspace crates reference each other by path without a version; that is
# the only wildcard shape we accept.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
