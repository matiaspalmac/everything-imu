name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to attach the draft release to (e.g. v0.0.0-test)"
        required: true
        default: "v0.0.0-test"

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - id: meta
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          # Only alpha + rc count as prerelease for GitHub's "Latest" badge;
          # beta tags must stay non-prerelease so the updater endpoint at
          # /releases/latest/download/latest.json resolves to the newest
          # beta (GitHub refuses to mark a prerelease as Latest).
          if [[ "$TAG" =~ -(alpha|rc) ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.os }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - run: git config --global core.autocrlf false
      - uses: actions/checkout@v6

      - name: Install Linux Tauri deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libayatana-appindicator3-1 \
            libdbusmenu-glib4 \
            libdbusmenu-gtk3-4 \
            libxdo-dev \
            libssl-dev \
            libudev-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@1.88.0

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install npm deps
        run: pnpm install --frozen-lockfile

      - name: Tauri build + GitHub release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseName: "everything-imu ${{ needs.prepare.outputs.tag }}"
          releaseBody: "See the auto-generated release notes below and CHANGELOG.md in the repository for the full history."
          releaseDraft: true
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          projectPath: apps/everything-imu-app
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          makeLatest: true
