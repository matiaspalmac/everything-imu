name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - run: git config --global core.autocrlf false
      - uses: actions/checkout@v6

      - name: Install Linux Tauri deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            libssl-dev \
            libudev-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Cargo fmt
        run: cargo fmt --all -- --check

      - name: Cargo check
        run: cargo check --workspace --all-targets

      - name: Cargo test
        run: cargo test --workspace

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  ui:
    name: UI ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - run: git config --global core.autocrlf false
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (vitest)
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Lint (biome)
        run: pnpm lint

  android:
    name: Android (phone + wear)
    runs-on: ubuntu-latest
    steps:
      - run: git config --global core.autocrlf false
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r27c

      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.10.2"

      - name: Assemble debug (phone + wear) with native VQF
        working-directory: mobile
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: gradle :app-mobile:assembleDebug :app-wear:assembleDebug --stacktrace

      - name: Gradle check
        working-directory: mobile
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: gradle check --stacktrace

      - name: Upload debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apks
          path: |
            mobile/app-mobile/build/outputs/apk/debug/*.apk
            mobile/app-wear/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 14
