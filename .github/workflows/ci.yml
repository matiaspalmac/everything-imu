name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow the release pipeline to run the full CI as a pre-build gate so a tag
  # push cannot bypass fmt / clippy / test / UI checks.
  workflow_call:

env:
  CARGO_TERM_COLOR: always

# Cancel superseded runs on the same ref — pushing a fix-up shouldn't leave
# the previous pipeline burning runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  rust:
    name: Rust ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - run: git config --global core.autocrlf false
      - uses: actions/checkout@v7

      - name: Install Linux Tauri deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            libssl-dev \
            libudev-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Cargo fmt
        run: cargo fmt --all -- --check

      - name: Cargo check
        run: cargo check --workspace --all-targets --locked

      - name: Cargo test
        run: cargo test --workspace --locked

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  ui:
    name: UI ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - run: git config --global core.autocrlf false
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (vitest)
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Lint (biome)
        run: pnpm lint

      - name: Docs format (prettier)
        run: pnpm docs:check

      - name: Dead code (knip)
        run: pnpm --filter @everything-imu/ui knip

      - name: Dependency audit (pnpm)
        run: pnpm audit --audit-level high

  supply-chain:
    name: Supply chain (cargo-deny)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories licenses bans sources
